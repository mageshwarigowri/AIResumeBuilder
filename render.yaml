services:
  - type: web
    name: careercanvas-ai-resume-builder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && npm install && npm run build && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn --chdir backend resumebuilder.wsgi:application
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: NODE_VERSION
        value: 20.15.1
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
